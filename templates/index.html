<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMax API Plan</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>MiniMax API Plan</h1>
            <p class="subtitle">智能体代码评测平台 - 最小可用版本</p>
        </header>

        <main class="main">
            <div class="chat-section">
                <div class="input-section">
                    <label for="prompt">输入 Prompt:</label>
                    <textarea
                        id="prompt"
                        name="prompt"
                        rows="6"
                        placeholder="请输入您的问题或指令..."
                        required
                    ></textarea>

                    <div class="options">
                        <div class="option-group">
                            <label for="model">模型:</label>
                            <select id="model" name="model"></select>
                        </div>
                        <div class="option-group">
                            <label for="temperature">Temperature:</label>
                            <input
                                type="number"
                                id="temperature"
                                name="temperature"
                            >
                        </div>
                        <div class="option-group">
                            <label for="max_tokens">Max Tokens:</label>
                            <input
                                type="number"
                                id="max_tokens"
                                name="max_tokens"
                            >
                        </div>
                    </div>

                    <button id="sendBtn" class="btn-primary">发送请求</button>
                </div>

                <div class="output-section">
                    <label>响应结果:</label>
                    <div id="response" class="response-box">
                        <p class="placeholder">等待输入并发送请求...</p>
                    </div>

                    <div id="response-info" class="response-info" style="display: none;">
                        <h4>请求信息:</h4>
                        <div id="info-content"></div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 MiniMax API Plan. 为智能体代码评测而生。</p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
