<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMax API Plan</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="user-bar">
            <div id="auth-status" class="auth-status">
                <span class="loading-text">加载中...</span>
            </div>
        </div>

        <header class="header">
            <h1>MiniMax API Plan</h1>
            <p class="subtitle">智能体代码评测平台 - 最小可用版本</p>
        </header>

        <main class="main">
            <div id="login-prompt" class="login-prompt" style="display: none;">
                <div class="prompt-box">
                    <h3>请先登录</h3>
                    <p>登录后即可使用智能体代码评测功能</p>
                    <button id="show-login-btn" class="btn-primary">立即登录</button>
                    <button id="show-register-btn" class="btn-secondary">注册账号</button>
                </div>
            </div>

            <div id="chat-section" class="chat-section" style="display: none;">
                <div class="input-section">
                    <label for="prompt">输入 Prompt:</label>
                    <textarea
                        id="prompt"
                        name="prompt"
                        rows="6"
                        placeholder="请输入您的问题或指令..."
                        required
                    ></textarea>

                    <div class="options">
                        <div class="option-group">
                            <label for="model">模型:</label>
                            <select id="model" name="model"></select>
                        </div>
                        <div class="option-group">
                            <label for="temperature">Temperature:</label>
                            <input
                                type="number"
                                id="temperature"
                                name="temperature"
                            >
                        </div>
                        <div class="option-group">
                            <label for="max_tokens">Max Tokens:</label>
                            <input
                                type="number"
                                id="max_tokens"
                                name="max_tokens"
                            >
                        </div>
                    </div>

                    <button id="sendBtn" class="btn-primary">发送请求</button>
                </div>

                <div class="output-section">
                    <label>响应结果:</label>
                    <div id="response" class="response-box">
                        <p class="placeholder">等待输入并发送请求...</p>
                    </div>

                    <div id="response-info" class="response-info" style="display: none;">
                        <h4>请求信息:</h4>
                        <div id="info-content"></div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 MiniMax API Plan. 为智能体代码评测而生。</p>
        </footer>
    </div>

    <div id="login-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>用户登录</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-username">用户名:</label>
                    <input type="text" id="login-username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="login-password">密码:</label>
                    <input type="password" id="login-password" name="password" required>
                </div>
                <div id="login-error" class="form-error" style="display: none;"></div>
                <button type="submit" class="btn-primary">登录</button>
                <p class="auth-switch">
                    还没有账号？<a href="#" id="switch-to-register">立即注册</a>
                </p>
            </form>
        </div>
    </div>

    <div id="register-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>用户注册</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="register-username">用户名 (至少3个字符):</label>
                    <input type="text" id="register-username" name="username" required minlength="3">
                </div>
                <div class="form-group">
                    <label for="register-email">邮箱 (可选):</label>
                    <input type="email" id="register-email" name="email">
                </div>
                <div class="form-group">
                    <label for="register-password">密码 (至少6个字符):</label>
                    <input type="password" id="register-password" name="password" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="register-confirm-password">确认密码:</label>
                    <input type="password" id="register-confirm-password" name="confirm_password" required>
                </div>
                <div id="register-error" class="form-error" style="display: none;"></div>
                <button type="submit" class="btn-primary">注册</button>
                <p class="auth-switch">
                    已有账号？<a href="#" id="switch-to-login">立即登录</a>
                </p>
            </form>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay" style="display: none;"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
